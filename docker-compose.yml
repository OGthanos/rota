services:
  rota-core:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: rota-core
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-8000}:8000"
      - "${API_PORT:-8001}:8001"
    environment:
      - PROXY_PORT=${PROXY_PORT:-8000}
      - API_PORT=${API_PORT:-8001}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DB_HOST=${DB_HOST:-timescaledb}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-rota}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-rota}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - ROTA_ADMIN_USER=${ROTA_ADMIN_USER:-admin}
      - ROTA_ADMIN_PASSWORD=${ROTA_ADMIN_PASSWORD}
    networks:
      - rota-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8001/health",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    depends_on:
      timescaledb:
        condition: service_healthy

  rota-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: rota-dashboard
    restart: unless-stopped
    ports:
      - "3020:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    networks:
      - rota-network
    depends_on:
      rota-core:
        condition: service_healthy

  timescaledb:
    image: timescale/timescaledb:2.22.1-pg17
    container_name: rota-timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-rota}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-rota}
      - TIMESCALEDB_TELEMETRY=off
    volumes:
      - ./data/timescaledb:/var/lib/postgresql/data
    networks:
      - rota-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rota} -d ${DB_NAME:-rota}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

networks:
  rota-network:
    driver: bridge
